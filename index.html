<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RushCode</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><text y='.9em' font-size='56'>🗿</text></svg>">
    <style>
        :root {
            --red: #e63946;
            --blue: #457b9d;
            --gold: #f4a261;
            --bg: #1a1a2e;
            --panel-bg: rgba(20, 20, 30, 0.85);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            width: 100vw; height: 100vh;
            overflow: hidden;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }
        #gameCanvas { position: absolute; top:0; left:0; width:100%; height:100%; z-index:1; }

        /* Menu Principal */
        #mainMenu, #lobbyScreen {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.55); backdrop-filter: blur(12px);
            z-index:200; display:flex; align-items:center; justify-content:center;
            flex-direction:column; color:white; gap:2.5vmin;
            transition: opacity 0.5s, visibility 0.5s;
        }
        #lobbyScreen { display: none; }
        #mainMenu.hidden, #lobbyScreen.hidden { opacity:0; visibility:hidden; pointer-events:none; }
        .menu-title {
            font-size: 7vmin; font-weight: 900; letter-spacing: 0.25em;
            background: linear-gradient(135deg, #f4a261, #e76f51, #e9c46a);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: none; filter: drop-shadow(0 0 1.5vmin rgba(244,162,97,0.5));
        }
        .menu-subtitle { font-size: 2vmin; opacity: 0.85; letter-spacing: 0.3em; margin-top: -1vmin; }
        .menu-panel, .lobby-panel {
            background: linear-gradient(145deg, rgba(30,30,50,0.95), rgba(15,15,30,0.95));
            border-radius: 3vmin; padding: 4vmin;
            display:flex; flex-direction:column; gap: 2vmin;
            min-width: 42vmin; max-width: 90vw;
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 3vmin 6vmin rgba(0,0,0,0.5), 0 0 3vmin rgba(244,162,97,0.15);
        }
        .menu-panel label, .lobby-panel label {
            font-size: 1.7vmin; color: #ccc; text-transform: uppercase; letter-spacing: 0.1em;
        }
        .menu-panel input, .menu-panel select, .lobby-panel select {
            padding: 1.5vmin 2vmin; border-radius: 1.5vmin;
            background: rgba(0,0,0,0.5); color: white;
            border: 1px solid rgba(255,255,255,0.25); font-size: 2vmin;
            outline: none; transition: 0.3s;
        }
        .menu-panel input:focus, .menu-panel select:focus {
            border-color: var(--gold); box-shadow: 0 0 1.5vmin rgba(244,162,97,0.4);
        }
        .menu-btn {
            padding: 2vmin 4vmin; border-radius: 3vmin; border: none;
            font-weight: 700; font-size: 2vmin; cursor: pointer; text-transform: uppercase;
            letter-spacing: 0.08em; transition: all 0.3s;
            color: white; box-shadow: 0 0.8vmin 2vmin rgba(0,0,0,0.3);
        }
        .menu-btn:hover { transform: translateY(-0.3vmin); box-shadow: 0 1.5vmin 3vmin rgba(0,0,0,0.4); }
        .menu-btn:active { transform: scale(0.96); }
        .btn-single { background: linear-gradient(135deg, #457b9d, #1d3557); }
        .btn-multi { background: linear-gradient(135deg, #6c5ce7, #4a3f9a); }
        .btn-join { background: linear-gradient(135deg, #27ae60, #1e8449); }
        .btn-copy { background: linear-gradient(135deg, #e67e22, #b85c0a); }
        .btn-start { background: linear-gradient(135deg, #2ecc71, #27ae60); }
        .btn-menu { background: linear-gradient(135deg, #c0392b, #962d22); }
        .player-list { max-height: 30vmin; overflow-y: auto; display: flex; flex-direction: column; gap: 1vmin; }
        .player-item {
            background: rgba(255,255,255,0.08); padding: 1.2vmin 2vmin; border-radius: 1.5vmin;
            display: flex; justify-content: space-between; font-size: 1.8vmin;
            border-left: 0.5vmin solid var(--gold);
        }
        .ui-overlay { position:absolute; z-index:10; pointer-events:none; }
        .ui-overlay > * { pointer-events:auto; }
        .top-bar {
            top:2vmin; left:50%; transform:translateX(-50%);
            background:var(--panel-bg); border-radius:3vmin; padding:1.5vmin 3vmin;
            backdrop-filter:blur(10px); color:white; font-weight:700; font-size:2.2vmin;
            display:none; gap:2vmin; align-items:center; flex-wrap:wrap; justify-content:center;
        }
        .turn-badge { padding:1vmin 2.5vmin; border-radius:4vmin; }
        .turn-red { background:var(--red); }
        .turn-blue { background:var(--blue); }
        .turn-wait { background:#555; }
        .confirm-btn {
            background: #2ecc71; color: white; border: none;
            padding: 1vmin 2vmin; border-radius: 2vmin;
            font-weight: 700; cursor: pointer; font-size: 2vmin;
            display: none;
        }
        .confirm-btn.visible { display: inline-block; }
        .confirm-btn:disabled { opacity:0.4; cursor:not-allowed; }
        .floating-joystick {
            position: absolute; width: 22vmin; height: 22vmin;
            background: radial-gradient(circle, rgba(255,255,255,0.25) 0%, rgba(0,0,0,0.7) 90%);
            border-radius: 50%; border: 0.4vmin solid rgba(255,255,255,0.5);
            z-index: 25; pointer-events: auto; display: none;
            transform: translate(-50%, -50%);
        }
        .floating-joystick .thumb {
            position: absolute; width: 45%; height: 45%;
            background: radial-gradient(circle at 35% 35%, #ffd966, #b8860b);
            border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%);
        }
        #chatContainer {
            position:fixed; bottom:0; left:0; width:100%; z-index:30;
            background:var(--panel-bg); border-top:2px solid var(--gold);
            display:none; flex-direction:column;
        }
        #chatHeader { display:flex; justify-content:space-between; align-items:center; padding:1vmin 2vmin; background:rgba(0,0,0,0.5); cursor:pointer; }
        .chat-messages { flex:1; overflow-y:auto; padding:1vmin; max-height:20vmin; font-size:1.6vmin; }
        .chat-msg { padding:0.8vmin 1.2vmin; border-radius:1.5vmin; word-break:break-word; }
        .chat-self { background:#d4edda; color:#155724; align-self:flex-end; }
        .chat-other { background:#e2e3e5; color:#383d41; align-self:flex-start; }
        .chat-system { background:#fff3cd; color:#856404; align-self:center; }
        .chat-spymaster { background:#d1ecf1; color:#0c5460; align-self:flex-start; font-weight:bold; }
        .chat-input-row { display:flex; gap:1vmin; padding:1vmin; border-top:1px solid rgba(255,255,255,0.2); }
        .chat-input { flex:1; padding:1vmin; border-radius:2vmin; border:none; font-size:1.8vmin; }
        .chat-send { padding:1vmin 2vmin; border-radius:2vmin; background:var(--gold); border:none; cursor:pointer; }
        .chat-disabled { opacity:0.5; pointer-events:none; }
        .action-buttons { top:2vmin; right:2vmin; display:none; gap:1vmin; flex-direction:column; position:absolute; z-index:15; }
        .btn { background:var(--blue); color:white; border:none; padding:1.5vmin 3vmin; border-radius:3vmin; font-weight:700; cursor:pointer; }
        #customModal {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
            z-index: 999; display: none; align-items: center; justify-content: center;
        }
        #customModal.visible { display: flex; }
        .modal-content {
            background: #2c3e50; border-radius: 2vmin; padding: 3vmin;
            text-align: center; color: white; min-width: 30vmin; max-width: 80vw;
            box-shadow: 0 0 5vmin rgba(0,0,0,0.8);
        }
        .modal-content p { font-size: 2vmin; margin-bottom: 2vmin; }
        .modal-buttons { display: flex; gap: 2vmin; justify-content: center; }
        .modal-btn { padding: 1.5vmin 3vmin; border-radius: 2vmin; border: none; font-weight: 700; cursor: pointer; font-size: 1.8vmin; }
        .modal-btn.confirm { background: #27ae60; color: white; }
        .modal-btn.cancel { background: #c0392b; color: white; }
    </style>
</head>
<body>
    <div id="gameCanvas"></div>
    <div id="mainMenu">
        <div class="menu-title">RUSHCODE</div>
        <div class="menu-subtitle">ESPIONAGEM & ESTRATÉGIA</div>
        <div class="menu-panel">
            <label>🪪 Nickname</label>
            <input type="text" id="menuNickname" value="Jogador">
            <label>🎯 Time</label>
            <select id="teamSelect"><option value="red">🔴 Vermelho</option><option value="blue">🔵 Azul</option></select>
            <label>🎭 Papel</label>
            <select id="roleSelect"><option value="spy">🕵️ Mestre</option><option value="op">🔍 Operador</option></select>
            <button class="menu-btn btn-single" id="btnSingle">🎮 Singleplayer</button>
            <button class="menu-btn btn-multi" id="btnCreate">🌐 Criar Sala</button>
            <input type="text" id="menuRoomLink" placeholder="🔗 Colar link..." style="display:none;">
            <button class="menu-btn btn-join" id="btnJoin" style="display:none;">🚪 Entrar</button>
        </div>
    </div>

    <div id="lobbyScreen">
        <div class="lobby-panel">
            <h2>🏠 Lobby RushCode</h2>
            <div id="lobbyLink" style="display:none;">
                <span>🔗 Sala:</span>
                <span id="lobbyRoomLink" style="font-family:monospace; word-break:break-all;"></span>
                <button class="menu-btn btn-copy" id="lobbyCopyLink">📋 Copiar</button>
            </div>
            <div class="player-list" id="playerList"></div>
            <button class="menu-btn btn-start" id="btnStartGame" style="display:none;">🚀 Iniciar Jogo</button>
            <button class="menu-btn btn-menu" id="btnLeaveLobby">❌ Sair</button>
        </div>
    </div>

    <div class="top-bar ui-overlay" id="topBar">
        <span class="turn-badge turn-red" id="turnIndicator">🔴 VEZ: VERMELHO</span>
        <span>🔴<span id="redScore">9</span> 🔵<span id="blueScore">8</span></span>
        <span id="hintText"></span>
        <span id="guessesLeft"></span>
        <button class="confirm-btn" id="confirmButton" disabled>✔ Revelar</button>
    </div>
    <div class="action-buttons ui-overlay" id="actionButtons">
        <button class="btn" id="btnPass">⏭️ Passar</button>
        <button class="btn" id="btnNewGame">🔄 Novo</button>
        <button class="btn btn-menu" id="btnMenu">🏠 Menu</button>
    </div>
    <div id="chatContainer">
        <div id="chatHeader"><h4>💬 Chat</h4><button id="chatToggle">▼</button></div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-row" id="chatInputRow">
            <input class="chat-input" id="chatInput" placeholder="Mensagem...">
            <button class="chat-send" id="chatSend">Enviar</button>
        </div>
    </div>
    <div id="customModal">
        <div class="modal-content">
            <p id="modalMessage"></p>
            <div class="modal-buttons" id="modalButtons"></div>
        </div>
    </div>

    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>
    <script type="module">
        import * as THREE from 'three';

        // ==================== MODAL POPUP ====================
        function showModal(message, buttons = [], autoCloseMs = 0) {
            return new Promise((resolve) => {
                const modal = document.getElementById('customModal');
                document.getElementById('modalMessage').textContent = message;
                const btnsContainer = document.getElementById('modalButtons');
                btnsContainer.innerHTML = '';
                if (buttons.length === 0) {
                    modal.classList.add('visible');
                    if (autoCloseMs > 0) { setTimeout(() => { modal.classList.remove('visible'); resolve(true); }, autoCloseMs); }
                    return;
                }
                buttons.forEach(btn => {
                    const button = document.createElement('button');
                    button.className = `modal-btn ${btn.type || 'confirm'}`;
                    button.textContent = btn.text;
                    button.addEventListener('click', () => { modal.classList.remove('visible'); resolve(btn.value); });
                    btnsContainer.appendChild(button);
                });
                modal.classList.add('visible');
            });
        }
        function customAlert(msg) { return showModal(msg, [{ text: 'OK', value: true, type: 'confirm' }]); }
        function customConfirm(msg) { return showModal(msg, [{ text: 'Sim', value: true, type: 'confirm' }, { text: 'Não', value: false, type: 'cancel' }]); }
        function showInfoModal(msg) { return showModal(msg, [], 2000); }

        const GROQ_API_KEY = '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';
        const GROQ_ENDPOINT = 'https://api.groq.com/openai/v1/chat/completions';
        const MODEL = 'llama3-8b-8192';

        const DEFAULT_WORDS = [
            "ABISMO","ALQUIMIA","ÂNCORA","ARQUÉTIPO","BALADA","BÚSSOLA","CALABOUÇO","CARMA",
            "CATÁSTROFE","CETICISMO","CLÍMAX","CONSPIRAÇÃO","CRÔNICA","DÉJÀ-VU","DILEMA",
            "ECLIPSE","EFÊMERO","ELIXIR","ENIGMA","ENTROPIA","EPIFANIA","ESFINGE","ESPECTRO",
            "ESTIGMA","EUFORIA","FANTASMAGORIA","FENÔMENO","FRACTAL","GÊNESE","HARMONIA",
            "HEDONISMO","HIPÓTESE","ICONOCLASTA","ILUSÃO","IMINÊNCIA","INÉRCIA","INFINITO",
            "LABIRINTO","MELANCOLIA","METÁFORA","MIRAGEM","MISTICISMO","NEXO","NIRVANA",
            "OBSCURIDADE","OCASO","ONIPOTÊNCIA","OXIMORO","PARADOXO","PENUMBRA","PERDIÇÃO",
            "PESADELO","PRISMA","PROFECIA","QUIMERA","REFLEXO","RESILIÊNCIA","REVELAÇÃO",
            "SARCASMO","SÍMBOLO","SINFONIA","SISIFO","SOBERANIA","SUBLIMAÇÃO","TRANSCENDÊNCIA",
            "UMBRAL","UTOPIA","VERTIGEM","VÓRTICE","ZENITE"
        ];
        let wordList = [...DEFAULT_WORDS];

        const gameState = {
            words: [], teams: [], revealed: [],
            redRemaining: 9, blueRemaining: 8,
            gameOver: false, winner: null,
            currentTurn: 'red',
            clueWord: '', clueNumber: 0, guessesRemaining: 0,
            spymasterView: false, gameMode: null,
            humanMaster: { red: false, blue: false }
        };

        let myNick = '', myRole = null, myTeam = 'red';
        let isHost = false, hostConn = null, peer = null, connections = {}, peerRoles = {};
        let gameActive = false;
        let lobbyPlayers = [];

        const $ = (id) => document.getElementById(id);

        const CARD_SIZE = 1.4, SPACING = 1.7;
        const BOARD_OFFSET_X = -SPACING * 2, BOARD_OFFSET_Z = -SPACING * 2;
        let scene, camera, renderer, playerGroup, cardMeshes = [];
        let currentCardIndex = 12, moveDir = { x: 0, z: 0 };
        let cameraAngleX = 0, cameraAngleY = Math.PI / 6, cameraDistance = 16;
        let isDragging = false, lastMouseX = 0, lastMouseY = 0;
        const CAMERA_SENSITIVITY = 0.01, MIN_DISTANCE = 10, MAX_DISTANCE = 25;
        let operativeMeshes = { red: null, blue: null };
        let botTimeout = null;

        // ==================== IA ====================
        async function groqChat(messages) {
            try {
                const response = await fetch(GROQ_ENDPOINT, { method: 'POST', headers: { 'Authorization': `Bearer ${GROQ_API_KEY}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ model: MODEL, messages, temperature: 0.7, max_tokens: 50 }) });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                return data.choices[0].message.content.trim();
            } catch (e) { console.error('Groq API error:', e); return null; }
        }

        async function generateClueAI() {
            if (gameState.gameOver) return;
            const team = gameState.currentTurn;
            const unrevealed = [];
            for (let i = 0; i < 25; i++) if (!gameState.revealed[i] && gameState.teams[i] === team) unrevealed.push(gameState.words[i]);
            if (!unrevealed.length) return;
            const allWords = gameState.words.join(', ');
            const prompt = `Você é um mestre do Codenames. O time é ${team}. As palavras do time são: ${unrevealed.join(', ')}. Dê uma dica de UMA palavra (não pode ser nenhuma das palavras do tabuleiro: ${allWords}) e um número (ex: animal 2). Responda APENAS com a palavra e o número separados por espaço.`;
            const response = await groqChat([{ role: 'user', content: prompt }]);
            if (response) {
                const parts = response.split(' '); const word = parts[0].toUpperCase(); const number = parseInt(parts[1]) || 1;
                if (gameState.words.includes(word)) { const fallback = generateClueFallback(); setClue(fallback.word, fallback.number); addChatMessage(`Dica IA: ${fallback.word} (${fallback.number})`, 'spymaster'); return; }
                setClue(word, Math.min(number, unrevealed.length));
                addChatMessage(`Dica IA: ${word} (${Math.min(number, unrevealed.length)})`, 'spymaster');
            } else { const fallback = generateClueFallback(); setClue(fallback.word, fallback.number); addChatMessage(`Dica IA: ${fallback.word} (${fallback.number})`, 'spymaster'); }
        }
        function generateClueFallback() { const team = gameState.currentTurn; const unrevealed = []; for (let i = 0; i < 25; i++) if (!gameState.revealed[i] && gameState.teams[i] === team) unrevealed.push(gameState.words[i]); const word = unrevealed[0]; return { word: word.toUpperCase(), number: 1 }; }
        async function botGuessAI() {
            if (gameState.gameOver) return null;
            const clue = gameState.clueWord; const candidates = [];
            for (let i = 0; i < 25; i++) if (!gameState.revealed[i]) candidates.push({ index: i, word: gameState.words[i] });
            if (candidates.length === 0) return null;
            const prompt = `Escolha o índice (0 a 24) da palavra que melhor se relaciona com a dica "${clue}". Palavras disponíveis: ${candidates.map(c => `${c.index}:${c.word}`).join(', ')}. Responda APENAS com o número do índice.`;
            const response = await groqChat([{ role: 'user', content: prompt }]);
            if (response) { const num = parseInt(response); if (!isNaN(num) && num >= 0 && num < 25 && !gameState.revealed[num]) return num; }
            return candidates[Math.floor(Math.random() * candidates.length)].index;
        }

        // ==================== THREE.JS ====================
        function createOperativeMesh(team) {
            const group = new THREE.Group(); const color = team === 'red' ? 0xe63946 : 0x457b9d;
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.3, 0.8, 8), new THREE.MeshStandardMaterial({ color })); body.position.y = 0.4; body.castShadow = true; group.add(body);
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.25, 16, 16), new THREE.MeshStandardMaterial({ color: 0xffccaa })); head.position.y = 0.95; head.castShadow = true; group.add(head);
            const hat = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.3, 0.3, 8), new THREE.MeshStandardMaterial({ color: 0x222 })); hat.position.y = 1.15; hat.castShadow = true; group.add(hat);
            group.position.set(0, 0.2, 0); group.visible = true; scene.add(group); return group;
        }
        function initOperatives() {
            if (operativeMeshes.red) scene.remove(operativeMeshes.red);
            if (operativeMeshes.blue) scene.remove(operativeMeshes.blue);
            if (gameState.gameMode === 'single') {
                operativeMeshes.red = createOperativeMesh('red'); operativeMeshes.blue = createOperativeMesh('blue');
                const redPos = getCardPosition(0); const bluePos = getCardPosition(24);
                operativeMeshes.red.position.set(redPos.x - 1.5, 0.2, redPos.z - 1.5);
                operativeMeshes.blue.position.set(bluePos.x + 1.5, 0.2, bluePos.z + 1.5);
            } else { operativeMeshes.red = null; operativeMeshes.blue = null; }
        }
        function createWordTexture(word, revealed, team, showColorHint = false) {
            const canvas = document.createElement('canvas'); canvas.width = 256; canvas.height = 256; const ctx = canvas.getContext('2d');
            let bg = '#f1faee';
            if (revealed || showColorHint) { if (team === 'red') bg = '#e63946'; else if (team === 'blue') bg = '#457b9d'; else if (team === 'civilian') bg = '#e9c46a'; else if (team === 'assassin') bg = '#1d1d1d'; }
            ctx.fillStyle = bg; ctx.fillRect(0, 0, 256, 256); ctx.strokeStyle = '#a8dadc'; ctx.lineWidth = 10; ctx.strokeRect(5, 5, 246, 246);
            ctx.fillStyle = (revealed && ['assassin', 'red', 'blue'].includes(team)) ? '#fff' : '#1d3557';
            ctx.font = 'bold 42px "Segoe UI"'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            if (word.length > 8) ctx.font = 'bold 28px "Segoe UI"'; ctx.fillText(word, 128, 128);
            return new THREE.CanvasTexture(canvas);
        }
        function rebuildBoard() {
            if (!scene) return; cardMeshes.forEach(m => scene.remove(m)); cardMeshes = [];
            const isSpymaster = myRole === 'spy';
            for (let i = 0; i < 25; i++) {
                const row = Math.floor(i / 5), col = i % 5; const x = BOARD_OFFSET_X + col * SPACING, z = BOARD_OFFSET_Z + row * SPACING;
                const revealed = gameState.revealed[i], team = gameState.teams[i]; const showHint = isSpymaster && !revealed;
                const tex = createWordTexture(gameState.words[i], revealed, team, showHint);
                const mat = new THREE.MeshStandardMaterial({ map: tex, roughness: 0.4 }); const geo = new THREE.BoxGeometry(CARD_SIZE, 0.15, CARD_SIZE);
                const card = new THREE.Mesh(geo, mat); card.position.set(x, 0.075, z); card.castShadow = card.receiveShadow = true;
                card.userData = { index: i }; scene.add(card); cardMeshes.push(card);
            }
        }

        // ==================== CENÁRIO BONITO ====================
        function createScene() {
            scene = new THREE.Scene();
            // Céu com gradiente
            const canvas = document.createElement('canvas'); canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(256, 180, 50, 256, 400, 500);
            gradient.addColorStop(0, '#3a3f6e'); gradient.addColorStop(0.5, '#1a1a2e'); gradient.addColorStop(1, '#0a0a15');
            ctx.fillStyle = gradient; ctx.fillRect(0, 0, 512, 512);
            // Estrelas
            for (let i = 0; i < 100; i++) { ctx.fillStyle = `rgba(255,255,255,${Math.random()*0.8+0.2})`; ctx.fillRect(Math.random()*512, Math.random()*300, 2, 2); }
            const skyTex = new THREE.CanvasTexture(canvas);
            scene.background = skyTex;

            // Neblina
            scene.fog = new THREE.Fog(0x1a1a2e, 20, 50);

            // Luz principal
            const sun = new THREE.DirectionalLight(0xffeedd, 4); sun.position.set(20, 25, 10); sun.castShadow = true;
            sun.shadow.mapSize.set(1024, 1024); sun.shadow.camera.near = 1; sun.shadow.camera.far = 60;
            sun.shadow.camera.left = -15; sun.shadow.camera.right = 15; sun.shadow.camera.top = 15; sun.shadow.camera.bottom = -15;
            scene.add(sun);
            scene.add(new THREE.AmbientLight(0x334466, 1.2));

            // Água abaixo da ilha
            const waterGeo = new THREE.PlaneGeometry(40, 40);
            const waterMat = new THREE.MeshStandardMaterial({ color: 0x1a3a5c, roughness: 0.3, metalness: 0.2, transparent: true, opacity: 0.85 });
            const water = new THREE.Mesh(waterGeo, waterMat); water.rotation.x = -Math.PI / 2; water.position.y = -4; water.receiveShadow = true; scene.add(water);

            // Ilha flutuante (base)
            const islandGeo = new THREE.CylinderGeometry(5, 7, 1.5, 16);
            const islandMat = new THREE.MeshStandardMaterial({ color: 0x5a4a3a, roughness: 0.9 });
            const island = new THREE.Mesh(islandGeo, islandMat); island.position.y = -0.9; island.castShadow = true; island.receiveShadow = true; scene.add(island);

            // Grama em cima
            const grassGeo = new THREE.CylinderGeometry(4.8, 5, 0.3, 16);
            const grassMat = new THREE.MeshStandardMaterial({ color: 0x4a7a3a, roughness: 0.8 });
            const grass = new THREE.Mesh(grassGeo, grassMat); grass.position.y = 0.05; grass.receiveShadow = true; scene.add(grass);

            // Montanhas ao fundo
            for (let i = 0; i < 5; i++) {
                const mountainGeo = new THREE.ConeGeometry(1.5 + Math.random()*2, 3 + Math.random()*4, 8);
                const mountainMat = new THREE.MeshStandardMaterial({ color: 0x4a5560 + Math.floor(Math.random()*0x202020), roughness: 0.85 });
                const mountain = new THREE.Mesh(mountainGeo, mountainMat);
                const angle = (i / 5) * Math.PI * 2 + Math.random()*0.5;
                mountain.position.set(Math.cos(angle)*8, -2.5, Math.sin(angle)*8);
                mountain.castShadow = true; mountain.receiveShadow = true; scene.add(mountain);
            }

            // Nuvens
            for (let i = 0; i < 8; i++) {
                const cloudGroup = new THREE.Group();
                for (let j = 0; j < 3; j++) {
                    const cloudGeo = new THREE.SphereGeometry(0.8 + Math.random()*0.6, 8, 8);
                    const cloudMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 1, transparent: true, opacity: 0.7 });
                    const cloudPart = new THREE.Mesh(cloudGeo, cloudMat);
                    cloudPart.position.set(j*1.2 - 1.2, Math.random()*0.3, Math.random()*0.4);
                    cloudGroup.add(cloudPart);
                }
                cloudGroup.position.set(-12 + i*3.5, 6 + Math.random()*4, -3 + Math.random()*6);
                scene.add(cloudGroup);
            }

            // Chão do tabuleiro
            const boardFloor = new THREE.Mesh(new THREE.PlaneGeometry(12, 12), new THREE.MeshStandardMaterial({ color: 0x3d2b1f, roughness: 0.7 }));
            boardFloor.rotation.x = -Math.PI / 2; boardFloor.position.y = 0.18; boardFloor.receiveShadow = true; scene.add(boardFloor);

            // Boneco do jogador
            const bodyColor = myTeam === 'red' ? 0xe63946 : 0x457b9d;
            playerGroup = new THREE.Group();
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.3, 0.8, 8), new THREE.MeshStandardMaterial({ color: bodyColor })); body.position.y = 0.4; body.castShadow = true; playerGroup.add(body);
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.25, 16, 16), new THREE.MeshStandardMaterial({ color: 0xffccaa })); head.position.y = 0.95; head.castShadow = true; playerGroup.add(head);
            const hat = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.3, 0.3, 8), new THREE.MeshStandardMaterial({ color: 0x222 })); hat.position.y = 1.15; hat.castShadow = true; playerGroup.add(hat);
            playerGroup.position.set(BOARD_OFFSET_X + 2 * SPACING, 0.35, BOARD_OFFSET_Z + 2 * SPACING);
            playerGroup.visible = false; scene.add(playerGroup);
        }

        function initThreeJS() {
            createScene();
            camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 100);
            camera.position.set(0, 8, 14);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(innerWidth, innerHeight); renderer.shadowMap.enabled = true;
            $('gameCanvas').appendChild(renderer.domElement);
            renderer.domElement.addEventListener('mousedown', onPointerDown);
            renderer.domElement.addEventListener('mousemove', onPointerMove);
            renderer.domElement.addEventListener('mouseup', onPointerUp);
            renderer.domElement.addEventListener('touchstart', onPointerDown, { passive: false });
            renderer.domElement.addEventListener('touchmove', onPointerMove, { passive: false });
            renderer.domElement.addEventListener('touchend', onPointerUp);
            renderer.domElement.addEventListener('wheel', onWheel, { passive: false });
        }

        let floatingJoystick = null, joystickActive = false, joystickStartPos = { x: 0, y: 0 };
        function onPointerDown(e) {
            if (!gameActive) return; e.preventDefault(); const pos = e.touches ? e.touches[0] : e;
            if (myRole === 'spy') { isDragging = true; lastMouseX = pos.clientX; lastMouseY = pos.clientY; }
            else if (myRole === 'op' && gameState.currentTurn === myTeam) {
                if (floatingJoystick) floatingJoystick.remove();
                floatingJoystick = document.createElement('div'); floatingJoystick.className = 'floating-joystick'; floatingJoystick.innerHTML = '<div class="thumb"></div>';
                document.body.appendChild(floatingJoystick); floatingJoystick.style.left = pos.clientX + 'px'; floatingJoystick.style.top = pos.clientY + 'px'; floatingJoystick.style.display = 'block';
                joystickStartPos = { x: pos.clientX, y: pos.clientY }; joystickActive = true;
            }
        }
        function onPointerMove(e) {
            if (!gameActive) return; e.preventDefault(); const pos = e.touches ? e.touches[0] : e;
            if (myRole === 'spy' && isDragging) {
                const dx = pos.clientX - lastMouseX, dy = pos.clientY - lastMouseY;
                cameraAngleX -= dx * CAMERA_SENSITIVITY; cameraAngleY -= dy * CAMERA_SENSITIVITY;
                cameraAngleY = Math.max(0.1, Math.min(Math.PI / 2, cameraAngleY)); lastMouseX = pos.clientX; lastMouseY = pos.clientY;
            } else if (myRole === 'op' && joystickActive && floatingJoystick) {
                const dx = pos.clientX - joystickStartPos.x, dy = pos.clientY - joystickStartPos.y, maxDist = 60, dist = Math.hypot(dx, dy), clampedDist = Math.min(dist, maxDist), angle = Math.atan2(dy, dx);
                const thumb = floatingJoystick.querySelector('.thumb'); thumb.style.transform = `translate(calc(-50% + ${Math.cos(angle)*clampedDist}px), calc(-50% + ${Math.sin(angle)*clampedDist}px))`;
                const mag = clampedDist / maxDist; moveDir.x = Math.cos(angle) * mag; moveDir.z = Math.sin(angle) * mag;
            }
        }
        function onPointerUp() { if (myRole === 'spy') isDragging = false; else if (myRole === 'op') { joystickActive = false; moveDir.x = 0; moveDir.z = 0; if (floatingJoystick) { floatingJoystick.remove(); floatingJoystick = null; } } }
        function onWheel(e) { if (myRole === 'spy' && gameActive) { e.preventDefault(); cameraDistance += e.deltaY * 0.01; cameraDistance = Math.max(MIN_DISTANCE, Math.min(MAX_DISTANCE, cameraDistance)); } }
        function updateCameraPosition() {
            if (myRole === 'spy') { const x = cameraDistance * Math.sin(cameraAngleY) * Math.cos(cameraAngleX); const y = cameraDistance * Math.cos(cameraAngleY); const z = cameraDistance * Math.sin(cameraAngleY) * Math.sin(cameraAngleX); camera.position.set(x, y, z); camera.lookAt(0, 0, 0); }
            else { const target = playerGroup.position.clone().add(new THREE.Vector3(0, 7, 9)); camera.position.lerp(target, 0.1); camera.lookAt(playerGroup.position.clone().add(new THREE.Vector3(0, 1, -1))); }
        }

        // ==================== JOGO ====================
        function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }
        function createGame() {
            const firstTeam = Math.random() < 0.5 ? 'red' : 'blue'; const secondTeam = firstTeam === 'red' ? 'blue' : 'red';
            const words = shuffle(wordList).slice(0, 25); const teams = [];
            for (let i = 0; i < 9; i++) teams.push(firstTeam); for (let i = 0; i < 8; i++) teams.push(secondTeam); for (let i = 0; i < 7; i++) teams.push('civilian'); teams.push('assassin');
            gameState.words = words; gameState.teams = shuffle(teams); gameState.revealed = new Array(25).fill(false);
            gameState.redRemaining = gameState.teams.filter(t => t === 'red').length; gameState.blueRemaining = gameState.teams.filter(t => t === 'blue').length;
            gameState.gameOver = false; gameState.winner = null; gameState.currentTurn = 'red'; gameState.clueWord = ''; gameState.clueNumber = 0; gameState.guessesRemaining = 0;
            if (gameState.gameMode === 'single') { gameState.humanMaster = { red: false, blue: false }; if (myRole === 'spy') gameState.humanMaster[myTeam] = true; }
            else { gameState.humanMaster = { red: false, blue: false }; for (const p of lobbyPlayers) { if (p.role === 'spy') gameState.humanMaster[p.team] = true; } }
            updateUI(); scheduleClue();
        }
        function getMasterForTeam(team) { return gameState.humanMaster[team] ? 'human' : 'ai'; }
        function scheduleClue() { if (gameState.gameOver) return; const team = gameState.currentTurn; if (getMasterForTeam(team) === 'human') { $('hintText').textContent = 'Aguardando dica do Mestre...'; $('guessesLeft').textContent = ''; updateChatState(); } else generateClueAI(); }
        function setClue(word, number) { gameState.clueWord = word; gameState.clueNumber = number; gameState.guessesRemaining = number + 1; $('hintText').textContent = `DICA: "${word}" (${number})`; $('guessesLeft').textContent = `Tentativas: ${gameState.guessesRemaining}`; updateChatState(); scheduleOperativeAction(); }
        function scheduleOperativeAction() { if (botTimeout) clearTimeout(botTimeout); if (gameState.gameOver) return; const team = gameState.currentTurn; if (gameState.gameMode === 'single' && !(myRole === 'op' && myTeam === team)) { botTimeout = setTimeout(() => performBotAction(), 1500); } }
        async function performBotAction() { if (gameState.gameOver || gameState.gameMode !== 'single') return; const team = gameState.currentTurn; const bestIndex = await botGuessAI(); if (bestIndex === null || gameState.revealed[bestIndex]) return; const chosenWord = gameState.words[bestIndex]; showInfoModal(`Peão ${team === 'red' ? '🔴 Vermelho' : '🔵 Azul'} escolheu: ${chosenWord}`); const mesh = operativeMeshes[team]; if (mesh) { const cardPos = getCardPosition(bestIndex); animateOperativeTo(mesh, cardPos, () => { revealCard(bestIndex); if (!gameState.gameOver && gameState.currentTurn === team && gameState.guessesRemaining > 0) performBotAction(); }); } else { revealCard(bestIndex); if (!gameState.gameOver && gameState.currentTurn === team && gameState.guessesRemaining > 0) performBotAction(); } }
        function animateOperativeTo(mesh, targetPos, callback) { const startPos = mesh.position.clone(), duration = 1000, startTime = Date.now(); function step() { const elapsed = Date.now() - startTime, t = Math.min(elapsed / duration, 1); mesh.position.lerpVectors(startPos, new THREE.Vector3(targetPos.x, 0.2, targetPos.z), t); mesh.position.y = 0.2 + Math.sin(t * Math.PI * 2) * 0.1; if (t < 1) requestAnimationFrame(step); else { mesh.position.set(targetPos.x, 0.2, targetPos.z); if (callback) callback(); } } step(); }
        function revealCard(index) {
            if (gameState.revealed[index] || gameState.gameOver) return; const team = gameState.teams[index]; gameState.revealed[index] = true;
            let points = 0, switchTurn = false;
            if (team === gameState.currentTurn) { points = 10; gameState.guessesRemaining--; if (team === 'red') gameState.redRemaining--; else gameState.blueRemaining--; if (gameState.guessesRemaining <= 0) switchTurn = true; }
            else if (team === 'assassin') { points = -20; gameState.gameOver = true; gameState.winner = gameState.currentTurn === 'red' ? 'blue' : 'red'; }
            else { points = -5; if (team === 'red') gameState.redRemaining--; else gameState.blueRemaining--; switchTurn = true; }
            if (gameState.redRemaining === 0) { gameState.gameOver = true; gameState.winner = 'red'; } else if (gameState.blueRemaining === 0) { gameState.gameOver = true; gameState.winner = 'blue'; }
            if (switchTurn && !gameState.gameOver) { gameState.currentTurn = gameState.currentTurn === 'red' ? 'blue' : 'red'; gameState.clueWord = ''; gameState.clueNumber = 0; gameState.guessesRemaining = 0; $('guessesLeft').textContent = ''; updateChatState(); scheduleClue(); }
            updateUI(); rebuildBoard(); showInfoModal(points >= 0 ? `+${points} pts` : `${points} pts`); updateConfirmButton();
            if (isHost) broadcastState();
        }
        function updateUI() { $('redScore').textContent = gameState.redRemaining; $('blueScore').textContent = gameState.blueRemaining; const turn = $('turnIndicator'); if (gameState.gameOver) { turn.textContent = gameState.winner === 'red' ? '🔴 VERMELHO VENCE!' : '🔵 AZUL VENCE!'; turn.className = 'turn-badge turn-wait'; } else { turn.textContent = gameState.currentTurn === 'red' ? '🔴 VEZ: VERMELHO' : '🔵 VEZ: AZUL'; turn.className = `turn-badge ${gameState.currentTurn === 'red' ? 'turn-red' : 'turn-blue'}`; } if (gameState.guessesRemaining > 0) $('guessesLeft').textContent = `Tentativas: ${gameState.guessesRemaining}`; else $('guessesLeft').textContent = ''; }
        function updateConfirmButton() { const btn = $('confirmButton'); if (myRole === 'op' && !gameState.gameOver && gameState.currentTurn === myTeam && currentCardIndex !== null && !gameState.revealed[currentCardIndex]) { btn.classList.add('visible'); btn.disabled = false; } else { btn.classList.remove('visible'); btn.disabled = true; } }
        function updateChatState() { const row = $('chatInputRow'); if (myRole === 'spy') { if (gameState.clueWord && gameState.currentTurn === myTeam) row.classList.add('chat-disabled'); else row.classList.remove('chat-disabled'); } else row.classList.remove('chat-disabled'); }
        function sendChatMessage() { const input = $('chatInput'); const text = input.value.trim(); if (!text) return; if (myRole === 'spy') { const parts = text.split(' '); const word = parts[0]; const number = parseInt(parts[1]) || 1; if (!gameState.clueWord || gameState.currentTurn !== myTeam) { setClue(word, number); gameState.guessesRemaining = number + 1; $('guessesLeft').textContent = `Tentativas: ${gameState.guessesRemaining}`; if (gameState.gameMode === 'multi') { if (isHost) broadcast({ type: 'clue', word, number }); else if (hostConn) hostConn.send({ type: 'clue', word, number }); } addChatMessage(`Dica: ${word} (${number})`, 'spymaster'); } } else { if (gameState.gameMode === 'multi') { if (isHost) { broadcast({ type: 'chat', from: myNick, text }); addChatMessage(text, 'self'); } else if (hostConn) { hostConn.send({ type: 'chat', from: myNick, text }); addChatMessage(text, 'self'); } } else addChatMessage(text, 'self'); } input.value = ''; }

        // ==================== REDE ====================
        function updateLobbyUI() { const list = $('playerList'); list.innerHTML = ''; for (const p of lobbyPlayers) { const div = document.createElement('div'); div.className = 'player-item'; div.innerHTML = `<span>${p.nick} (${p.team === 'red' ? '🔴' : '🔵'})</span><span>${p.role === 'spy' ? 'Mestre' : 'Operador'}</span>`; list.appendChild(div); } $('btnStartGame').style.display = isHost ? 'block' : 'none'; }
        function showLobby() { $('mainMenu').classList.add('hidden'); $('lobbyScreen').style.display = 'flex'; if (isHost) { $('lobbyLink').style.display = 'block'; } updateLobbyUI(); }
        function initPeer(roomId) { peer = new Peer(roomId || undefined, { config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] } }); peer.on('open', id => { if (!roomId) { isHost = true; const link = `${location.origin}${location.pathname}?room=${id}`; $('lobbyRoomLink').textContent = link; lobbyPlayers = [{ id: peer.id, nick: myNick, team: myTeam, role: myRole }]; showLobby(); } if (roomId) { connectToHost(roomId); } }); peer.on('connection', conn => { connections[conn.peer] = conn; conn.on('data', data => handleMessage(conn, data)); }); }
        function connectToHost(hostId) { const conn = peer.connect(hostId, { reliable: true }); conn.on('open', () => { hostConn = conn; conn.on('data', data => handleMessage(conn, data)); conn.send({ type: 'join', nick: myNick, role: myRole, team: myTeam }); showLobby(); }); }
        function handleMessage(conn, data) { if (data.type === 'join' && isHost) { const newPlayer = { id: conn.peer, nick: data.nick, role: data.role, team: data.team }; if (!lobbyPlayers.find(p => p.id === conn.peer)) { lobbyPlayers.push(newPlayer); } broadcast({ type: 'lobbyUpdate', players: lobbyPlayers }); if (data.role === 'spy') gameState.humanMaster[data.team] = true; updateLobbyUI(); } else if (data.type === 'lobbyUpdate') { lobbyPlayers = data.players; updateLobbyUI(); } else if (data.type === 'startGame') { $('lobbyScreen').style.display = 'none'; startGame(); } else if (data.type === 'state') { Object.assign(gameState, data.state); updateUI(); rebuildBoard(); updateConfirmButton(); updateChatState(); } else if (data.type === 'clue') { setClue(data.word, data.number); updateChatState(); } else if (data.type === 'action') { if (data.action === 'click') revealCard(data.index); else if (data.action === 'pass') { gameState.currentTurn = gameState.currentTurn === 'red' ? 'blue' : 'red'; gameState.clueWord = ''; gameState.guessesRemaining = 0; $('guessesLeft').textContent = ''; updateUI(); updateChatState(); if (isHost) broadcastState(); scheduleClue(); } } else if (data.type === 'chat') { addChatMessage(data.text, data.from === myNick ? 'self' : 'other', data.from); if (isHost) broadcast(data, conn.peer); } }
        function broadcast(msg, exclude) { Object.values(connections).forEach(c => { if (c.peer !== exclude) c.send(msg); }); }
        function broadcastState() { broadcast({ type: 'state', state: gameState }); }
        function addChatMessage(text, type, sender) { const div = document.createElement('div'); div.className = `chat-msg chat-${type}`; div.textContent = (sender ? sender + ': ' : '') + text; $('chatMessages').appendChild(div); div.scrollIntoView({ behavior: 'smooth' }); }

        function bindEvents() {
            $('btnSingle').addEventListener('click', () => { myNick = $('menuNickname').value.trim()||'Jogador'; myTeam = $('teamSelect').value; myRole = $('roleSelect').value; gameState.gameMode = 'single'; isHost = true; startGame(); });
            $('btnCreate').addEventListener('click', () => { myNick = $('menuNickname').value.trim()||'Host'; myTeam = $('teamSelect').value; myRole = $('roleSelect').value; gameState.gameMode = 'multi'; initPeer(null); });
            $('btnJoin').addEventListener('click', async () => { const link = $('menuRoomLink').value.trim(); if (!link) { await customAlert('Cole o link da sala.'); return; } const url = new URL(link); const roomId = url.searchParams.get('room'); if (!roomId) { await customAlert('Link inválido.'); return; } myNick = $('menuNickname').value.trim()||'Jogador'; myTeam = $('teamSelect').value; myRole = $('roleSelect').value; gameState.gameMode = 'multi'; initPeer(roomId); });
            $('lobbyCopyLink').addEventListener('click', () => { navigator.clipboard.writeText($('lobbyRoomLink').textContent); customAlert('Link copiado!'); });
            $('btnStartGame').addEventListener('click', () => { if (!isHost) return; broadcast({ type: 'startGame' }); $('lobbyScreen').style.display = 'none'; startGame(); });
            $('btnLeaveLobby').addEventListener('click', () => { if (peer) { peer.destroy(); } location.reload(); });
            $('confirmButton').addEventListener('click', () => { if (currentCardIndex !== null && !gameState.revealed[currentCardIndex] && !gameState.gameOver) { revealCard(currentCardIndex); if (!isHost && hostConn) hostConn.send({ type: 'action', action: 'click', index: currentCardIndex }); } });
            $('btnPass').addEventListener('click', () => { if (gameState.gameOver) return; gameState.currentTurn = gameState.currentTurn === 'red' ? 'blue' : 'red'; gameState.clueWord = ''; gameState.guessesRemaining = 0; $('guessesLeft').textContent = ''; updateUI(); updateChatState(); if (isHost) broadcastState(); else if (hostConn) hostConn.send({ type: 'action', action: 'pass' }); scheduleClue(); });
            $('btnNewGame').addEventListener('click', () => { createGame(); rebuildBoard(); updateUI(); updateChatState(); if (isHost) broadcastState(); });
            $('btnMenu').addEventListener('click', async () => { const resposta = await customConfirm('Voltar ao menu inicial?'); if (resposta) location.reload(); });
            $('chatSend').addEventListener('click', sendChatMessage);
            $('chatInput').addEventListener('keypress', e => { if (e.key === 'Enter') sendChatMessage(); });
            $('chatHeader').addEventListener('click', () => { const msgs = $('chatMessages'), row = $('chatInputRow'); const hidden = msgs.style.display === 'none'; msgs.style.display = hidden ? 'flex' : 'none'; row.style.display = hidden ? 'flex' : 'none'; $('chatToggle').textContent = hidden ? '▼' : '▲'; });
        }
        function getCardPosition(i) { const row = Math.floor(i / 5), col = i % 5; return { x: BOARD_OFFSET_X + col * SPACING, z: BOARD_OFFSET_Z + row * SPACING }; }
        function animate() { requestAnimationFrame(animate); if (!gameActive || !playerGroup) return; const dt = Math.min(0.1, 0.016); if (playerGroup.visible && (Math.abs(moveDir.x) > 0.1 || Math.abs(moveDir.z) > 0.1)) { const p = playerGroup.position; p.x += moveDir.x * 4 * dt; p.z += moveDir.z * 4 * dt; const minX = BOARD_OFFSET_X - 0.5, maxX = BOARD_OFFSET_X + 4 * SPACING + 0.5, minZ = BOARD_OFFSET_Z - 0.5, maxZ = BOARD_OFFSET_Z + 4 * SPACING + 0.5; p.x = Math.max(minX, Math.min(maxX, p.x)); p.z = Math.max(minZ, Math.min(maxZ, p.z)); let closest = currentCardIndex, closestD = Infinity; for (let i = 0; i < 25; i++) { const cp = getCardPosition(i); const d = Math.hypot(p.x - cp.x, p.z - cp.z); if (d < closestD) { closestD = d; closest = i; } } currentCardIndex = closest; updateConfirmButton(); } if (playerGroup.visible) playerGroup.position.y = 0.35 + Math.sin(Date.now() * 0.008) * 0.08; updateCameraPosition(); renderer.render(scene, camera); }
        async function loadCustomWords() { try { const resp = await fetch('./Palavras/Packs.txt'); if (resp.ok) { const words = (await resp.text()).split(/\r?\n/).map(w => w.trim()).filter(w => w.length > 0); if (words.length >= 25) wordList = words; } } catch (e) {} }
        function startGame() { $('lobbyScreen').style.display = 'none'; $('mainMenu').classList.add('hidden'); $('topBar').style.display = 'flex'; $('actionButtons').style.display = 'flex'; $('chatContainer').style.display = 'flex'; playerGroup.visible = (myRole === 'op'); if (myRole !== 'op') { camera.position.set(0, 12, 16); camera.lookAt(0, 0, 0); } initOperatives(); createGame(); rebuildBoard(); updateUI(); updateChatState(); gameActive = true; }
        loadCustomWords().then(() => { initThreeJS(); bindEvents(); gameState.words = wordList.slice(0, 25); gameState.teams = new Array(25).fill('civilian'); gameState.revealed = new Array(25).fill(false); rebuildBoard(); animate(); });
    </script>
